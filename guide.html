    <nav class="navbar">
        <div class="container">
            <div class="logo">OBYXANATION</div>

                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ro">RO</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="content-section">
            <h1 data-en="How to Join OBYXANATION" data-ro="Cum să te alături OBYXANATION"></h1>
            <div class="guide-grid">
                <div class="guide-card">
                    <div class="step-number">1</div>
                    <h3>Install Minecraft Java Edition</h3>
                    <p data-en="Download and install Minecraft Java Edition from minecraft.net. Make sure you have a valid account." data-ro="Descarcă și instalează Minecraft Java Edition de pe minecraft.net. Asigură-te că ai un cont valid."></p>
                </div>
                <div class="guide-card">
                    <div class="step-number">2</div>
                    <h3>Open Minecraft Launcher</h3>
                    <p data-en="Launch the Minecraft game and make sure you're logged in with your account." data-ro="Lansează jocul Minecraft și asigură-te că ești conectat cu contul tău."></p>
                </div>
                <div class="guide-card">
                    <div class="step-number">3</div>
                    <h3>Go to Multiplayer</h3>
                    <p data-en="Click on 'Multiplayer' in the main menu to access multiplayer servers." data-ro="Dă clic pe 'Multiplayer' în meniul principal pentru a accesa serverele multiplayer."></p>
                </div>
                <div class="guide-card">
                    <div class="step-number">4</div>
                    <h3>Add Our Server</h3>
                    <p>Click 'Add Server' and enter the server address:</p>
                    <code class="server-address">OBYXANATION.aternos.me:12492</code>
                </div>
                <div class="guide-card">
                    <div class="step-number">5</div>
                    <h3>Connect & Play!</h3>
                    <p data-en="Click on the server in your list and press 'Join Server'. Welcome to OBYXANATION!" data-ro="Dă clic pe server în lista ta și apasă 'Alătură-te Serverului'. Bine ți-am venit la OBYXANATION!"></p>
                </div>
                <div class="guide-card">
                    <div class="step-number">📋</div>
                    <h3>Read the Rules</h3>
                    <p data-en="Before playing, make sure to read our server rules!" data-ro="Înainte de a juca, asigură-te că citești regulile serverului nostru!"></p>
                    <a href="rules.html" class="btn btn-small">View Rules</a>
                </div>
            </div>
        </section>
    </main>
